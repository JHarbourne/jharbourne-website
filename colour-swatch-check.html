<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Colour Swatch Check</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
  h2 { margin-bottom: 12px; font-size: 1rem; color: #444; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-width: 900px; }
  .swatch { border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .bg { height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; }
  .text-sample { font-size: 13px; font-weight: 600; letter-spacing: .02em; }
  .meta { font-size: 10px; padding: 8px; background: #fff; }
  .meta strong { font-size: 11px; display: block; margin-bottom: 2px; }
  .role-tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 99px; font-weight: 700; margin-bottom: 3px; }
  .attention { background: #fef3c7; color: #92400e; }
  .control   { background: #e0e7ff; color: #3730a3; }
  .special   { background: #fce7f3; color: #9d174d; }
  .contested { background: #dcfce7; color: #166534; }
</style>
</head>
<body>
<h2>Contrast Study v3 — Background Colour Swatches</h2>
<div class="grid">
</div>
</body>
</html>
